<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Worship Chords</title>
  <script src="https://cdn.jsdelivr.net/npm/chordsheetjs@latest"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .controls {
      text-align: center;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 15px;
      margin: 5px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .transpose {
      background: #f39c12;
      color: #000;
    }
    .reset {
      background: #e74c3c;
      color: #fff;
    }
    #song {
      background: #222;
      padding: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
    }
    .chord {
      color: #00ffcc;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Labis na Galak</h1>

<div class="controls">
  <button class="transpose" onclick="transpose(1)">+1</button>
  <button class="transpose" onclick="transpose(-1)">-1</button>
  <button class="reset" onclick="resetTranspose()">Reset</button>
</div>

<div id="song"></div>

<script>
const originalSong = `
{title: Labis na Galak}
{artist: Faith Music Manila}

[Verse 1]
[B]Mga [E]labi ko O, [F#]Diyos sa'Yo aawit
[B]Ika'y [E]papurihan sa [F#]kalangitan
[B]Mga [E]labi ko O [F#]Diyos sa ‘Yo aawit
[B]Ika’y [E]papurihan sa [F#]kalangitan

[E]Aking [F#]kamay itataas Ka
[E]Pangalan Mo’y [F#]luwalhatiin
[E]’Pagkat [C#m]Ikaw O, Diyos ay [F#]dakila

[Chorus]
[B/D#]Napakasayang [E]magbigay [F#]papuri
[B/D#]Labis na [E]galak [F#]nararamdaman
[B/D#]Pupurihin [E]Ka sa bawat [F#]tugtugan
[B/D#]Pupurihin [E]Ka sa bawat [F#]galaw
[E]Itataas ang [C#m]ngalan Mo [F#]magpakailanman

[Verse 2]
[B]Sa taglay mong [E]lakas O, Diyos [F#]purihin Ka
[B]Isisigaw sa [E]buong mundo [F#]labis Mong gawa

[E]Puso ko ay [F#]tuwang-tuwa
[E]Kasiyahan ay [F#]umaapaw
[E]Katapatan Mo [C#m]O, Diyos ay [F#]dakila

[Outro]
[B] [B] [B] [B] [B] [B] [B] [B]
`;

let currentTranspose = 0;

const parser = new ChordSheetJS.ChordProParser();
const formatter = new ChordSheetJS.HtmlDivFormatter();

function renderSong() {
  const song = parser.parse(originalSong);
  const transposed = song.transpose(currentTranspose);
  document.getElementById("song").innerHTML = formatter.format(transposed);
}

function transpose(step) {
  currentTranspose += step;
  renderSong();
}

function resetTranspose() {
  currentTranspose = 0;
  renderSong();
}

// initial render
renderSong();
</script>

</body>
</html>
